<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Watch Party</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary: #ff0f39; 
            --glass: rgba(20, 20, 25, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f1f1f1;
        }

        /* Animated Aurora Background */
        body {
            margin: 0; padding: 0;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--text-main);
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Video Elements */
        .video-wrapper {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 1; opacity: 0; pointer-events: none;
            transition: opacity 1s ease-in-out;
        }
        .video-wrapper.active { opacity: 1; pointer-events: auto; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* The Main Dashboard (Glassmorphism) */
        .dashboard {
            position: relative; z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            text-align: center; max-width: 600px; width: 90%;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
        }
        .dashboard.hidden { transform: translateY(100px) scale(0.9); opacity: 0; pointer-events: none; }

        h1 { margin: 0 0 10px 0; font-weight: 300; letter-spacing: 2px; }
        .subtitle { color: #aaa; margin-bottom: 30px; font-size: 0.95rem; }

        /* Split Layout */
        .action-split { display: flex; gap: 20px; flex-wrap: wrap; }
        .card {
            flex: 1; min-width: 200px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .id-display {
            font-family: monospace; font-size: 1.8rem; font-weight: bold; 
            color: #00e5ff; letter-spacing: 4px; margin: 15px 0;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        input {
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            color: white; padding: 14px; border-radius: 10px; outline: none;
            font-size: 1.1rem; text-align: center; text-transform: uppercase;
            width: calc(100% - 30px); margin: 15px 0; letter-spacing: 2px;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(255, 15, 57, 0.2); }

        button {
            background: var(--primary); color: white; border: none;
            padding: 14px 24px; border-radius: 10px; cursor: pointer;
            font-weight: bold; font-size: 1rem; transition: all 0.2s; width: 100%;
        }
        button:hover { background: #ff2a4e; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 15, 57, 0.4); }
        .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: #ccc; margin-top: 10px; }
        .btn-outline:hover { background: rgba(255,255,255,0.1); transform: none; box-shadow: none; }

        /* Floating Chat Canvas */
        #floating-canvas {
            position: absolute; bottom: 80px; left: 0; width: 100%; height: calc(100% - 80px);
            pointer-events: none; overflow: hidden; z-index: 20;
        }
        .floating-item {
            position: absolute; bottom: 0; font-size: 1.2rem; font-weight: bold;
            background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px;
            backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.1);
            animation: floatUp 4.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            10% { opacity: 1; transform: translateY(0) scale(1.05); }
            20% { transform: translateY(0) scale(1); }
            80% { opacity: 0.9; }
            100% { opacity: 0; transform: translateY(-500px) scale(1); }
        }

        /* Movie Controls Overlay (Appears on Hover during movie) */
        .movie-controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--glass); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 50px;
            padding: 10px 20px; display: flex; gap: 15px; align-items: center;
            z-index: 30; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .video-wrapper:hover .movie-controls, .movie-controls:focus-within { opacity: 1; pointer-events: auto; }
        
        .chat-input-mini {
            background: transparent; border: none; color: white; outline: none; width: 180px; font-size: 1rem;
        }
        .reaction-btn { background: transparent; border: none; font-size: 1.5rem; cursor: pointer; transition: 0.2s; padding: 0 5px;}
        .reaction-btn:hover { transform: scale(1.3); }

    </style>
</head>
<body>

    <div class="video-wrapper" id="video-layer">
        <video id="video-player" autoplay playsinline></video>
        <div id="floating-canvas"></div>
        
        <div class="movie-controls">
            <input type="text" id="chat-input" class="chat-input-mini" placeholder="Type a message...">
            <button class="reaction-btn" onclick="sendReaction('❤️')">❤️</button>
            <button class="reaction-btn" onclick="sendReaction('😂')">😂</button>
            <button class="reaction-btn" onclick="sendReaction('😮')">😮</button>
            <button class="reaction-btn" style="font-size: 1rem; background: rgba(255,255,255,0.1); border-radius: 50%; padding: 8px;" onclick="location.reload()">Exit</button>
        </div>
    </div>

    <div class="dashboard" id="main-dashboard">
        <h1>Night Owls Studio</h1>
        <div class="subtitle">Connect directly. No buffering, no servers.</div>
        
        <div class="action-split">
            <div class="card">
                <span style="color: #aaa; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Your Code</span>
                <div class="id-display" id="my-id">...</div>
                <div>
                    <button class="btn-outline" onclick="copyID()">Copy Code</button>
                    <button id="start-hosting-btn" style="margin-top: 15px;">Host a Movie</button>
                </div>
            </div>

            <div class="card">
                <span style="color: #aaa; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Join a Room</span>
                <input type="text" id="friend-id" placeholder="Paste Code Here" maxlength="6">
                <button id="join-btn">Join Movie</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. PERSISTENT ID LOGIC ---
        const generateShortID = () => Math.random().toString(36).substring(2, 8).toUpperCase();
        
        // Check local storage. If no ID exists, create one and save it.
        let myId = localStorage.getItem('watchPartyID');
        if (!myId) {
            myId = generateShortID();
            localStorage.setItem('watchPartyID', myId);
        }

        const peer = new Peer(myId);
        let dataConnection = null; 
        const videoPlayer = document.getElementById('video-player');
        const canvas = document.getElementById('floating-canvas');

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        function copyID() {
            navigator.clipboard.writeText(myId);
            const btn = document.querySelector('.btn-outline');
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy Code", 2000);
        }

        // --- 2. UI IMMERSION TRIGGER ---
        function triggerImmersionMode() {
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById('video-layer').classList.add('active');
        }

        // --- 3. HOSTING (You click "Host") ---
        document.getElementById('start-hosting-btn').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                videoPlayer.srcObject = stream; 
                videoPlayer.muted = true; // Mute locally
                triggerImmersionMode();
                spawnFloatingItem("Waiting for friend to connect...", "center");

                // Listen for her incoming connection
                peer.on('connection', (conn) => {
                    dataConnection = conn;
                    setupDataConnection();
                });

                peer.on('call', (call) => {
                    call.answer(stream); // Send your screen to her
                    spawnFloatingItem("✨ Friend Joined the Room!", "center");
                });

            } catch (err) {
                console.error(err);
                alert("Screen share cancelled or failed.");
            }
        });

        // --- 4. JOINING (She clicks "Join") ---
        document.getElementById('join-btn').addEventListener('click', () => {
            const friendId = document.getElementById('friend-id').value.toUpperCase();
            if (!friendId) return alert("Please enter a code!");

            // 1. Connect Chat
            dataConnection = peer.connect(friendId);
            setupDataConnection();

            // 2. Request Video
            // We pass a dummy stream just to initiate the WebRTC handshake properly
            navigator.mediaDevices.getUserMedia({ audio: true }).then(dummyStream => {
                 const call = peer.call(friendId, dummyStream);
                 
                 call.on('stream', (remoteStream) => {
                    videoPlayer.srcObject = remoteStream;
                    
                    // CRITICAL FOR MOBILE: Force play on user interaction
                    videoPlayer.play().catch(e => console.log("Autoplay prevented:", e));
                    
                    triggerImmersionMode();
                    spawnFloatingItem("🍿 Connected! Enjoy the movie.", "center");
                });
            }).catch(err => {
                // Fallback if they deny mic permission
                const call = peer.call(friendId);
                call.on('stream', (remoteStream) => {
                    videoPlayer.srcObject = remoteStream;
                    videoPlayer.play().catch(e => console.log("Autoplay prevented:", e));
                    triggerImmersionMode();
                    spawnFloatingItem("🍿 Connected! Enjoy the movie.", "center");
                });
            });
        });

        // --- 5. CHAT & REACTION ENGINE ---
        function setupDataConnection() {
            dataConnection.on('data', (data) => {
                spawnFloatingItem(data.message, "left");
            });
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const msg = e.target.value;
                if (msg && dataConnection && dataConnection.open) {
                    dataConnection.send({ message: msg });
                    spawnFloatingItem(msg, "right"); 
                    e.target.value = '';
                }
            }
        });

        function sendReaction(emoji) {
            if (dataConnection && dataConnection.open) dataConnection.send({ message: emoji });
            spawnFloatingItem(emoji, "right");
        }

        function spawnFloatingItem(text, side) {
            const item = document.createElement('div');
            item.className = 'floating-item';
            item.innerText = text;
            
            const randomOffset = Math.floor(Math.random() * 15);
            
            if (side === "left") {
                item.style.left = (10 + randomOffset) + '%';
                item.style.borderColor = "rgba(0, 229, 255, 0.4)"; 
            } else if (side === "right") {
                item.style.right = (10 + randomOffset) + '%';
                item.style.borderColor = "rgba(255, 15, 57, 0.4)"; 
            } else {
                item.style.left = "50%"; 
                item.style.transform = "translateX(-50%)";
            }

            canvas.appendChild(item);
            setTimeout(() => item.remove(), 4500);
        }
    </script>
</body>
</html>
