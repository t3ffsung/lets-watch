<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stardust Cinema</title>
    <style>
        /* --- THE STARDUST THEME --- */
        :root {
            --love-red: #ff2a5f;
            --starlight: #e0c3fc;
            --glass: rgba(15, 10, 25, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff; height: 100dvh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overscroll-behavior-y: none; 
        }

        /* Ambient Stars Background */
        #stars-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px var(--starlight); animation: twinkle infinite alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }

        /* Video Layer */
        .video-wrapper {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: #000; z-index: 5; opacity: 0; pointer-events: none;
            transition: opacity 1.5s ease-in-out;
        }
        .video-wrapper.active { opacity: 1; pointer-events: auto; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* The iOS Unblocker Overlay */
        #ios-play-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(0,0,0,0.85); z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .pulse-play {
            background: var(--love-red); color: white; font-size: 1.5rem; font-weight: bold;
            padding: 20px 40px; border-radius: 50px; border: none; cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 42, 95, 0.6); animation: pulsePlay 2s infinite;
            -webkit-tap-highlight-color: transparent;
        }
        @keyframes pulsePlay { 0% { transform: scale(0.95); } 50% { transform: scale(1.05); } 100% { transform: scale(0.95); } }

        /* Dashboard Setup */
        .dashboard {
            position: relative; z-index: 10; background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 30px; padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8); text-align: center; max-width: 600px; width: 90%;
            transition: transform 0.8s ease, opacity 0.8s ease;
        }
        .dashboard.hidden { transform: translateY(100px) scale(0.9); opacity: 0; pointer-events: none; }

        h1 { margin: 0; font-weight: 300; letter-spacing: 5px; font-size: 2.2rem; text-transform: uppercase; color: var(--starlight); }
        .subtitle { color: #a39ebd; margin: 10px 0 30px 0; font-size: 0.9rem; font-style: italic; }

        .action-split { display: flex; gap: 20px; flex-wrap: wrap; }
        .card {
            flex: 1; min-width: 200px; background: rgba(255,255,255,0.02); 
            border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; 
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .id-display {
            font-family: 'Courier New', monospace; font-size: 2rem; font-weight: bold; 
            color: #fff; letter-spacing: 8px; margin: 15px 0; text-shadow: 0 0 15px var(--love-red);
        }

        input {
            background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: white;
            padding: 12px; border-radius: 10px; outline: none; font-size: 1rem; text-align: center; 
            text-transform: uppercase; width: calc(100% - 24px); margin: 15px 0; letter-spacing: 2px;
        }
        input:focus { border-color: var(--love-red); }

        button {
            background: linear-gradient(45deg, #ff0844 0%, #ffb199 100%); color: white; border: none;
            padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; 
            transition: 0.2s; width: 100%; box-shadow: 0 5px 15px rgba(255, 8, 68, 0.4);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255, 8, 68, 0.6); }
        .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: #ccc; box-shadow: none; margin-top: 10px;}

        /* --- THE NARROW MOVIE CONTROLS --- */
        .movie-controls {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 20px; 
            padding: 15px 10px; display: flex; flex-direction: column; gap: 10px; 
            align-items: center; z-index: 50; transition: opacity 0.5s ease;
            width: 160px; 
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
        }
        
        /* CHAT HISTORY UI */
        .chat-history {
            width: 100%; max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
            margin-bottom: 5px; padding-right: 5px; box-sizing: border-box;
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;
        }
        .chat-history::-webkit-scrollbar { width: 4px; }
        .chat-history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .history-msg {
            padding: 8px 12px; border-radius: 14px; font-size: 0.85rem; max-width: 90%; 
            word-wrap: break-word; line-height: 1.3;
        }
        .history-msg.me { background: rgba(255, 42, 95, 0.6); align-self: flex-end; border-bottom-right-radius: 2px; }
        .history-msg.friend { background: rgba(224, 195, 252, 0.25); align-self: flex-start; border-bottom-left-radius: 2px; }
        .history-msg.sys { background: none; color: rgba(255,255,255,0.5); align-self: center; font-size: 0.75rem; font-style: italic; text-align: center; padding: 2px; }

        .chat-input-mini {
            background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); border-radius: 20px;
            color: white; outline: none; width: 100%; font-size: 0.85rem; padding: 10px 12px;
            box-sizing: border-box; text-align: left; margin: 0; text-transform: none; letter-spacing: normal;
        }
        .chat-input-mini:focus { border-color: var(--starlight); }

        .control-panel-bottom {
            display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%;
        }
        
        .reaction-btn { 
            background: transparent; border: none; font-size: 1.5rem; cursor: pointer; 
            transition: transform 0.2s; padding: 5px; width: auto; box-shadow: none;
            -webkit-tap-highlight-color: transparent;
        }
        .reaction-btn:hover, .reaction-btn:active { transform: scale(1.3); background: transparent; box-shadow: none;}
        
        /* The renamed Heart Storm button */
        .heart-storm-btn { position: relative; }
        .heart-storm-btn::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%; box-shadow: 0 0 15px var(--love-red); animation: pulse 2s infinite; z-index: -1;
        }

        .sys-btn { 
            font-size: 1rem; background: rgba(255,255,255,0.1); color: #fff; border-radius: 50%; 
            width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; 
            padding: 0; border: 1px solid rgba(255,255,255,0.2); box-shadow: none;
            -webkit-tap-highlight-color: transparent; cursor: pointer;
        }

        /* --- FLOATING ENGINE (Now handles emojis AND text bubbles) --- */
        #floating-canvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 20; }
        
        .reaction-emoji { position: absolute; bottom: 120px; font-size: 3.5rem; animation: floatUp 5s ease-out forwards; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        
        .floating-text {
            position: absolute; bottom: 120px; font-size: 1.1rem; font-weight: 500;
            background: rgba(20, 10, 30, 0.85); padding: 12px 24px;
            backdrop-filter: blur(8px); border: 1px solid;
            animation: floatUp 6s cubic-bezier(0.2, 0.8, 0.4, 1) forwards; color: #fff; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            max-width: 300px; word-wrap: break-word; text-align: center;
        }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(50px) scale(0.8); }
            10% { opacity: 1; transform: translateY(0) scale(1); }
            80% { opacity: 0.9; }
            100% { opacity: 0; transform: translateY(-70dvh) scale(1.1); }
        }

        .heart-bomb { position: absolute; font-size: 2.5rem; animation: explode 2.5s ease-out forwards; pointer-events: none; }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(var(--rot)); opacity: 0; }
        }

        /* Mobile Layout Adjustments */
        @media (max-width: 800px) {
            .movie-controls {
                right: 50%; top: auto; bottom: env(safe-area-inset-bottom, 15px); transform: translateX(50%);
                width: 95%; max-width: 400px; padding: 10px; flex-direction: column;
            }
            .chat-history { max-height: 120px; }
            .control-panel-bottom { flex-wrap: nowrap; justify-content: space-evenly; }
        }
    </style>
</head>
<body>

    <div id="stars-canvas"></div>

    <div class="video-wrapper" id="video-layer">
        <video id="video-player" autoplay playsinline webkit-playsinline></video>
        <div id="floating-canvas"></div>
        
        <div class="movie-controls" id="movie-controls">
            
            <div class="chat-history" id="chat-history">
                <div class="history-msg sys">Chat secured.</div>
            </div>

            <input type="text" id="chat-input" class="chat-input-mini" placeholder="Whisper...">
            
            <div class="control-panel-bottom">
                <button class="reaction-btn" onclick="sendReaction('❤️')">❤️</button>
                <button class="reaction-btn heart-storm-btn" onclick="triggerHeartStorm()" title="Send Hearts">💌</button>
                <button class="reaction-btn" onclick="sendReaction('😂')">😂</button>
            </div>
            
            <div class="control-panel-bottom" style="margin-top: 5px;">
                <button class="sys-btn" onclick="toggleFullScreen()" title="Fullscreen">⛶</button>
                <button class="sys-btn" style="color: #ff2a5f; border-color: rgba(255,42,95,0.4);" onclick="location.reload()" title="Exit Room">✕</button>
            </div>
        </div>

        <div id="ios-play-overlay">
            <button class="pulse-play" id="force-play-btn">Tap to Start Movie 🍿</button>
        </div>
    </div>

    <div class="dashboard" id="main-dashboard">
        <h1>Stardust <span>Cinema</span></h1>
        <div class="subtitle">Reserved for two.</div>
        
        <div class="action-split">
            <div class="card">
                <span style="color: #ffb199; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px;">Your Ticket</span>
                <div class="id-display" id="my-id">...</div>
                <div>
                    <button class="btn-outline" onclick="copyID()">Copy Ticket 🎟️</button>
                    <button id="start-hosting-btn" style="margin-top: 15px;">Host Movie</button>
                </div>
            </div>

            <div class="card">
                <span style="color: var(--starlight); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px;">Join Her</span>
                <input type="text" id="friend-id" placeholder="Paste Ticket" maxlength="6">
                <button id="join-btn">Take a Seat</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>

    <script>
        function generateStars() {
            const canvas = document.getElementById('stars-canvas');
            for(let i = 0; i < 60; i++) {
                let star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = Math.random() * 5 + 's';
                canvas.appendChild(star);
            }
        }
        generateStars();

        function explodeHearts() {
            const canvas = document.getElementById('floating-canvas');
            const colors = ['#ff2a5f', '#ff0844', '#fbc2eb', '#e0c3fc'];
            for(let i = 0; i < 40; i++) {
                let heart = document.createElement('div');
                heart.className = 'heart-bomb';
                heart.innerText = ['❤️', '💖', '✨', '💌'][Math.floor(Math.random() * 4)];
                heart.style.left = '50%'; heart.style.top = '50%';
                
                let angle = Math.random() * Math.PI * 2;
                let velocity = 150 + Math.random() * 500; 
                heart.style.setProperty('--tx', Math.cos(angle) * velocity + 'px');
                heart.style.setProperty('--ty', Math.sin(angle) * velocity + 'px');
                heart.style.setProperty('--rot', (Math.random() * 360) + 'deg');
                heart.style.color = colors[Math.floor(Math.random() * colors.length)];
                
                canvas.appendChild(heart);
                setTimeout(() => heart.remove(), 2500);
            }
        }

        function toggleFullScreen() {
            const elem = document.getElementById("video-layer");
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (elem.requestFullscreen) { elem.requestFullscreen(); } 
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); } 
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
            }
        }

        // THE IDLE TIMER
        let idleTimer;
        const controls = document.getElementById('movie-controls');
        
        function resetIdleTimer() {
            controls.style.opacity = '1';
            controls.style.pointerEvents = 'auto';
            clearTimeout(idleTimer);
            
            if(document.getElementById('video-layer').classList.contains('active')) {
                idleTimer = setTimeout(() => {
                    if (document.activeElement !== document.getElementById('chat-input')) {
                        controls.style.opacity = '0';
                        controls.style.pointerEvents = 'none';
                    }
                }, 4000); 
            }
        }

        document.addEventListener('mousemove', resetIdleTimer);
        document.addEventListener('touchstart', resetIdleTimer);
        document.addEventListener('keydown', resetIdleTimer);
        document.getElementById('chat-input').addEventListener('focus', resetIdleTimer);

        // CHAT HISTORY ENGINE
        function appendToHistory(text, sender) {
            const history = document.getElementById('chat-history');
            const msgWrap = document.createElement('div');
            msgWrap.className = 'history-msg ' + sender;
            msgWrap.innerText = text;
            history.appendChild(msgWrap);
            history.scrollTop = history.scrollHeight;
        }

        // WEBRTC CONNECTION SETUP
        const generateShortID = () => Math.random().toString(36).substring(2, 8).toUpperCase();
        let myId = localStorage.getItem('stardustID');
        if (!myId) { myId = generateShortID(); localStorage.setItem('stardustID', myId); }

        let peer;
        let dataConnection = null; 
        let localStream = null; 
        const videoPlayer = document.getElementById('video-player');

        try {
            peer = new Peer(myId, {
                config: {
                    'iceServers': [
                        { url: 'stun:stun.l.google.com:19302' },
                        { url: 'stun:global.stun.twilio.com:3478' } 
                    ]
                }
            });
        } catch(e) { appendToHistory("Error starting engine.", "sys"); }

        window.addEventListener('beforeunload', () => { if (peer && !peer.destroyed) peer.destroy(); });

        peer.on('open', (id) => { document.getElementById('my-id').innerText = id; });
        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                localStorage.removeItem('stardustID'); location.reload();
            } else { appendToHistory("Network Error: " + err.type, "sys"); }
        });

        function copyID() {
            navigator.clipboard.writeText(myId);
            const btn = document.querySelector('.btn-outline');
            btn.innerText = "Ticket Copied! ✨";
            setTimeout(() => btn.innerText = "Copy Ticket 🎟️", 2000);
        }

        function triggerImmersionMode() {
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById('video-layer').classList.add('active');
            resetIdleTimer();
        }

        // HOST LOGIC
        document.getElementById('start-hosting-btn').addEventListener('click', async () => {
            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { frameRate: { ideal: 60 } }, audio: true 
                });
                
                videoPlayer.srcObject = localStream; 
                videoPlayer.muted = true; 
                videoPlayer.play().catch(e => console.log(e));
                
                triggerImmersionMode();
                appendToHistory("Screen captured. Waiting for her to join...", "sys");

                localStream.getVideoTracks()[0].onended = () => location.reload();
            } catch (err) { alert("Share cancelled."); }
        });

        peer.on('connection', (conn) => {
            dataConnection = conn;
            setupDataConnection();
            
            conn.on('open', () => {
                if (localStream) {
                    appendToHistory("She's here! Sending movie...", "sys");
                    peer.call(conn.peer, localStream);
                } else {
                    appendToHistory("She arrived in the lobby.", "sys");
                }
            });
        });

        // JOIN LOGIC
        document.getElementById('join-btn').addEventListener('click', () => {
            const hostId = document.getElementById('friend-id').value.toUpperCase();
            if (!hostId) return alert("Need a ticket to enter!");

            videoPlayer.load(); 
            appendToHistory("Knocking on theatre door...", "sys");
            dataConnection = peer.connect(hostId, { reliable: true });
            setupDataConnection();
        });

        document.getElementById('force-play-btn').addEventListener('click', function() {
            videoPlayer.play();
            document.getElementById('ios-play-overlay').style.display = 'none';
        });

        peer.on('call', (call) => {
            call.answer(); 
            call.on('stream', (remoteStream) => {
                videoPlayer.srcObject = remoteStream;
                
                let playPromise = videoPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        document.getElementById('ios-play-overlay').style.display = 'flex';
                    });
                }
                
                triggerImmersionMode();
                appendToHistory("🍿 Movie stream connected!", "sys");
            });
        });

        // CHAT LOGIC
        function setupDataConnection() {
            dataConnection.on('data', (data) => {
                // Handle the new Heart Storm
                if(data.type === 'heartStorm') { 
                    explodeHearts(); 
                    appendToHistory("💖 Sent a Heart Storm!", "sys");
                    return; 
                }
                
                // Handle Emoji reactions
                if(data.type === 'reaction') { 
                    spawnFloatingEmoji(data.message, "friend"); 
                    return; 
                }
                
                // Handle Text Messages (Log it AND Float it)
                appendToHistory(data.message, "friend");
                spawnFloatingText(data.message, "friend");
            });
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const msg = e.target.value;
                if (msg && dataConnection && dataConnection.open) {
                    dataConnection.send({ type: 'msg', message: msg });
                    
                    // Log it AND Float it for yourself too
                    appendToHistory(msg, "me"); 
                    spawnFloatingText(msg, "me");
                    
                    e.target.value = '';
                }
            }
        });

        function sendReaction(emoji) {
            spawnFloatingEmoji(emoji, "me");
            if (dataConnection && dataConnection.open) dataConnection.send({ type: 'reaction', message: emoji });
        }

        function triggerHeartStorm() {
            explodeHearts();
            appendToHistory("💖 Sent a Heart Storm!", "sys");
            if (dataConnection && dataConnection.open) dataConnection.send({ type: 'heartStorm' });
        }

        // Floats emojis upwards in the background
        function spawnFloatingEmoji(emoji, sender) {
            const canvas = document.getElementById('floating-canvas');
            const item = document.createElement('div');
            item.className = 'reaction-emoji';
            item.innerText = emoji;
            
            const randomOffset = Math.floor(Math.random() * 30);
            if (sender === "friend") { item.style.left = (10 + randomOffset) + '%'; } 
            else { item.style.right = (10 + randomOffset) + '%'; }

            canvas.appendChild(item);
            setTimeout(() => item.remove(), 4800);
        }

        // Floats frosted glass text bubbles upwards
        function spawnFloatingText(text, sender) {
            const canvas = document.getElementById('floating-canvas');
            const item = document.createElement('div');
            item.className = 'floating-text';
            item.innerText = text;
            
            const randomOffset = Math.floor(Math.random() * 20);
            if (sender === "friend") { 
                item.style.left = (5 + randomOffset) + '%'; 
                item.style.borderColor = "rgba(224, 195, 252, 0.5)";
                item.style.borderRadius = "20px 20px 20px 0";
            } else { 
                item.style.right = (5 + randomOffset) + '%'; 
                item.style.borderColor = "rgba(255, 42, 95, 0.5)";
                item.style.borderRadius = "20px 20px 0 20px";
            }

            canvas.appendChild(item);
            setTimeout(() => item.remove(), 5800);
        }
    </script>
</body>
</html>
