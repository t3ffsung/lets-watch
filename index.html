<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardust Cinema</title>
    <style>
        /* --- THE STARDUST THEME --- */
        :root {
            --love-red: #ff2a5f;
            --starlight: #e0c3fc;
            --deep-space: #0f0c29;
            --glass: rgba(20, 15, 35, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0; padding: 0;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Ambient Stars Background */
        #stars-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .star {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px var(--starlight);
            animation: twinkle infinite alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }

        /* Shooting Star Animation */
        .shooting-star {
            position: absolute; top: 10%; left: -10%; width: 150px; height: 2px;
            background: linear-gradient(to right, rgba(255,255,255,0), rgba(255,255,255,1));
            transform: rotate(-45deg); animation: shoot 8s linear infinite; opacity: 0;
        }
        @keyframes shoot { 0% { left: -10%; top: 10%; opacity: 1; } 20% { left: 110%; top: 60%; opacity: 0; } 100% { opacity: 0; } }

        /* Video Layer */
        .video-wrapper {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 5; opacity: 0; pointer-events: none;
            transition: opacity 2s ease-in-out;
        }
        .video-wrapper.active { opacity: 1; pointer-events: auto; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* Premium Dashboard */
        .dashboard {
            position: relative; z-index: 10;
            background: rgba(15, 10, 25, 0.6);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 30px; padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(224, 195, 252, 0.1);
            text-align: center; max-width: 600px; width: 90%;
            transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1), opacity 1s ease;
        }
        .dashboard.hidden { transform: translateY(100px) scale(0.9); opacity: 0; pointer-events: none; }

        h1 { margin: 0; font-weight: 300; letter-spacing: 5px; font-size: 2.5rem; text-transform: uppercase; color: var(--starlight); text-shadow: 0 0 20px rgba(224, 195, 252, 0.5); }
        .subtitle { color: #a39ebd; margin: 10px 0 40px 0; font-size: 1rem; font-style: italic; }

        .action-split { display: flex; gap: 20px; flex-wrap: wrap; }
        .card {
            flex: 1; min-width: 200px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 25px; display: flex; flex-direction: column; justify-content: space-between;
        }

        .id-display {
            font-family: 'Courier New', monospace; font-size: 2.2rem; font-weight: bold; 
            color: #fff; letter-spacing: 8px; margin: 15px 0; text-shadow: 0 0 15px var(--love-red);
        }

        input {
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: white;
            padding: 15px; border-radius: 12px; outline: none; font-size: 1.1rem; text-align: center; 
            text-transform: uppercase; width: calc(100% - 32px); margin: 15px 0; letter-spacing: 3px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--love-red); box-shadow: 0 0 15px rgba(255, 42, 95, 0.4); }

        button {
            background: linear-gradient(45deg, #ff0844 0%, #ffb199 100%); color: white; border: none;
            padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; 
            letter-spacing: 1px; transition: all 0.3s; width: 100%; box-shadow: 0 5px 20px rgba(255, 8, 68, 0.4);
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 8, 68, 0.6); }
        
        .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: #ccc; box-shadow: none; margin-top: 10px;}
        .btn-outline:hover { background: rgba(255,255,255,0.1); box-shadow: none; transform: none;}

        /* Floating Chat Engine */
        #floating-canvas { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 20; }
        
        .floating-item {
            position: absolute; bottom: 100px; font-size: 1.2rem; font-weight: 500;
            background: rgba(20, 10, 30, 0.8); padding: 12px 24px; border-radius: 20px 20px 20px 0;
            backdrop-filter: blur(8px); border: 1px solid rgba(255, 42, 95, 0.3);
            animation: floatUp 6s cubic-bezier(0.2, 0.8, 0.4, 1) forwards; color: #fff; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .floating-item.friend { border-color: rgba(224, 195, 252, 0.5); border-radius: 20px 20px 0 20px; }
        
        .reaction-emoji { font-size: 3rem; background: transparent; border: none; box-shadow: none; padding: 0; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(50px) scale(0.8); }
            10% { opacity: 1; transform: translateY(0) scale(1); }
            80% { opacity: 0.9; }
            100% { opacity: 0; transform: translateY(-70vh) scale(1.1); }
        }

        /* Explosion Animation */
        .heart-bomb { position: absolute; font-size: 2rem; animation: explode 2s ease-out forwards; pointer-events: none; }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(0.5); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(var(--rot)); opacity: 0; }
        }

        /* Sleek UI Controls - Optimized for Desktop & Mobile */
        .movie-controls {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); 
            border-radius: 20px; padding: 20px 15px; display: flex; flex-direction: column; gap: 15px; 
            align-items: center; z-index: 30; opacity: 0; transition: opacity 0.4s;
        }
        .video-wrapper:hover .movie-controls, .movie-controls:focus-within { opacity: 1; pointer-events: auto; }
        
        .chat-input-mini {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); border-radius: 25px;
            color: white; outline: none; width: 150px; font-size: 0.95rem; padding: 12px 15px;
            text-align: left; margin: 0; text-transform: none; letter-spacing: normal; font-style: italic;
        }
        .chat-input-mini:focus { border-color: var(--love-red); box-shadow: 0 0 10px rgba(255, 42, 95, 0.3); }
        
        .reaction-stack { display: flex; flex-direction: column; gap: 12px; margin-top: 5px; }
        .reaction-btn { 
            background: transparent; border: none; font-size: 1.8rem; cursor: pointer; 
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 5px; width: auto; box-shadow: none;
        }
        .reaction-btn:hover { transform: scale(1.4); background: transparent; box-shadow: none; }
        
        /* The special flirt button */
        .flirt-btn { position: relative; }
        .flirt-btn::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%; box-shadow: 0 0 15px var(--love-red); animation: pulse 2s infinite; z-index: -1;
        }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1.3); opacity: 0; } 100% { transform: scale(0.9); opacity: 0; } }

        .sys-btn { 
            font-size: 1rem; background: rgba(255,255,255,0.1); color: #fff; border-radius: 50%; 
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; 
            padding: 0; border: 1px solid rgba(255,255,255,0.2); box-shadow: none; margin-top: 5px;
        }
        .sys-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.1); box-shadow: none;}

        /* --- MOBILE RESPONSIVENESS FIX --- */
        @media (max-width: 768px) {
            .movie-controls {
                right: 50%; top: auto; bottom: 20px; transform: translateX(50%);
                flex-direction: row; width: 90%; max-width: 400px; justify-content: space-between;
                padding: 10px 15px; border-radius: 30px;
            }
            .chat-input-mini { width: 100px; padding: 10px; font-size: 0.85rem;}
            .reaction-stack { flex-direction: row; gap: 8px; margin-top: 0; }
            .reaction-btn { font-size: 1.5rem; }
            .sys-btn { width: 35px; height: 35px; font-size: 0.8rem; margin-top: 0;}
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="stars-canvas">
        <div class="shooting-star"></div>
    </div>

    <div class="video-wrapper" id="video-layer">
        <video id="video-player" autoplay playsinline></video>
        <div id="floating-canvas"></div>
        
        <div class="movie-controls">
            <input type="text" id="chat-input" class="chat-input-mini" placeholder="Whisper something...">
            <div class="reaction-stack">
                <button class="reaction-btn" onclick="sendReaction('❤️')">❤️</button>
                <button class="reaction-btn flirt-btn" onclick="triggerFlirtBomb()" title="Send Love">💌</button>
                <button class="reaction-btn" onclick="sendReaction('😂')">😂</button>
                <button class="reaction-btn" onclick="sendReaction('🍿')">🍿</button>
            </div>
            <button class="sys-btn" onclick="toggleFullScreen()" title="Fullscreen">⛶</button>
            <button class="sys-btn" style="color: #ff2a5f;" onclick="location.reload()" title="Exit Room">✕</button>
        </div>
    </div>

    <div class="dashboard" id="main-dashboard">
        <h1>Stardust <span>Cinema</span></h1>
        <div class="subtitle">Reserved for two.</div>
        
        <div class="action-split">
            <div class="card">
                <span style="color: #ffb199; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: bold;">Your VIP Ticket</span>
                <div class="id-display" id="my-id">...</div>
                <div>
                    <button class="btn-outline" onclick="copyID()">Copy Ticket 🎟️</button>
                    <button id="start-hosting-btn" style="margin-top: 15px;">Host Movie</button>
                </div>
            </div>

            <div class="card">
                <span style="color: var(--starlight); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: bold;">Join Her</span>
                <input type="text" id="friend-id" placeholder="Paste Ticket" maxlength="6">
                <button id="join-btn" style="background: linear-gradient(45deg, #a18cd1 0%, #fbc2eb 100%); color: #000; box-shadow: 0 5px 20px rgba(161, 140, 209, 0.4);">Take a Seat</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>

    <script>
        // --- VISUAL ENGINES ---
        function generateStars() {
            const canvas = document.getElementById('stars-canvas');
            for(let i = 0; i < 75; i++) {
                let star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = Math.random() * 5 + 's';
                canvas.appendChild(star);
            }
        }
        generateStars();

        // The Secret Flirt Bomb Animation
        function explodeHearts() {
            const canvas = document.getElementById('floating-canvas');
            const colors = ['#ff2a5f', '#ff0844', '#fbc2eb', '#e0c3fc'];
            for(let i = 0; i < 40; i++) {
                let heart = document.createElement('div');
                heart.className = 'heart-bomb';
                heart.innerText = ['❤️', '💖', '✨', '💌'][Math.floor(Math.random() * 4)];
                
                // Start from center
                heart.style.left = '50%';
                heart.style.top = '50%';
                
                // Calculate random explosion trajectory
                let angle = Math.random() * Math.PI * 2;
                let velocity = 100 + Math.random() * 400; // Distance
                let tx = Math.cos(angle) * velocity + 'px';
                let ty = Math.sin(angle) * velocity + 'px';
                let rot = (Math.random() * 360) + 'deg';
                
                heart.style.setProperty('--tx', tx);
                heart.style.setProperty('--ty', ty);
                heart.style.setProperty('--rot', rot);
                heart.style.color = colors[Math.floor(Math.random() * colors.length)];
                
                canvas.appendChild(heart);
                setTimeout(() => heart.remove(), 2000);
            }
        }

        // --- FULLSCREEN FIX FOR MOBILE ---
        function toggleFullScreen() {
            const elem = document.getElementById("video-layer");
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (elem.requestFullscreen) { elem.requestFullscreen(); } 
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } // iOS Safari fallback
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); } 
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
            }
        }

        // --- WEBRTC ENGINE (Pristine Logic) ---
        const generateShortID = () => Math.random().toString(36).substring(2, 8).toUpperCase();
        let myId = localStorage.getItem('stardustID');
        if (!myId) { myId = generateShortID(); localStorage.setItem('stardustID', myId); }

        const peer = new Peer(myId);
        let dataConnection = null; 
        let localStream = null; 
        const videoPlayer = document.getElementById('video-player');
        const canvas = document.getElementById('floating-canvas');

        peer.on('open', (id) => document.getElementById('my-id').innerText = id);

        function copyID() {
            navigator.clipboard.writeText(myId);
            const btn = document.querySelector('.btn-outline');
            btn.innerText = "Ticket Copied! ✨";
            setTimeout(() => btn.innerText = "Copy Ticket 🎟️", 2000);
        }

        function triggerImmersionMode() {
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById('video-layer').classList.add('active');
        }

        // 1. Listen for Her Chat Connection
        peer.on('connection', (conn) => {
            dataConnection = conn;
            setupDataConnection();
            if (localStream) {
                spawnFloatingItem("She's here. Starting movie...", "sys");
                peer.call(conn.peer, localStream);
            }
        });

        // 2. Listen for Your Video Call (This is how her screen answers)
        peer.on('call', (call) => {
            call.answer(); 
            call.on('stream', (remoteStream) => {
                videoPlayer.srcObject = remoteStream;
                videoPlayer.play().catch(e => console.log(e));
                triggerImmersionMode();
                spawnFloatingItem("🍿 Grab your popcorn.", "sys");
            });
        });

        // HOST ACTION
        document.getElementById('start-hosting-btn').addEventListener('click', async () => {
            try {
                // High frame-rate constraint added here to fix lag
                localStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { frameRate: { ideal: 60 } }, 
                    audio: true 
                });
                videoPlayer.srcObject = localStream; 
                videoPlayer.muted = true; 
                triggerImmersionMode();
                spawnFloatingItem("Waiting for her ticket...", "sys");

                if (dataConnection && dataConnection.open) {
                    peer.call(dataConnection.peer, localStream);
                }
                localStream.getVideoTracks()[0].onended = () => location.reload();
            } catch (err) {
                console.error(err); alert("Share cancelled.");
            }
        });

        // JOIN ACTION
        document.getElementById('join-btn').addEventListener('click', () => {
            const hostId = document.getElementById('friend-id').value.toUpperCase();
            if (!hostId) return alert("Need a ticket to enter!");

            dataConnection = peer.connect(hostId);
            setupDataConnection();
            spawnFloatingItem("Walking into the theatre...", "sys");
        });

        // --- CHAT & REACTION ENGINE ---
        function setupDataConnection() {
            dataConnection.on('data', (data) => {
                if(data.type === 'flirtBomb') { explodeHearts(); return; }
                spawnFloatingItem(data.message, "friend");
            });
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const msg = e.target.value;
                if (msg && dataConnection && dataConnection.open) {
                    dataConnection.send({ type: 'msg', message: msg });
                    spawnFloatingItem(msg, "me"); 
                    e.target.value = '';
                }
            }
        });

        function sendReaction(emoji) {
            if (dataConnection && dataConnection.open) dataConnection.send({ type: 'msg', message: emoji });
            spawnFloatingItem(emoji, "me");
        }

        function triggerFlirtBomb() {
            explodeHearts();
            if (dataConnection && dataConnection.open) dataConnection.send({ type: 'flirtBomb' });
        }

        function spawnFloatingItem(text, sender) {
            const item = document.createElement('div');
            item.className = 'floating-item';
            
            // Emoji detection for styling
            if (['❤️', '😂', '🍿', '✨'].includes(text)) {
                item.classList.add('reaction-emoji');
            } else {
                if (sender === "friend") item.classList.add('friend');
            }
            
            item.innerText = text;
            
            const randomOffset = Math.floor(Math.random() * 20);
            if (sender === "friend") {
                item.style.left = (5 + randomOffset) + '%';
            } else if (sender === "me") {
                item.style.right = (5 + randomOffset) + '%'; 
                item.style.left = 'auto';
                item.style.borderRadius = '20px 20px 0 20px'; // Tail on right
            } else { // System messages
                item.style.left = "50%"; 
                item.style.transform = "translateX(-50%)";
                item.style.background = "rgba(255,255,255,0.1)";
                item.style.border = "none";
            }

            canvas.appendChild(item);
            setTimeout(() => item.remove(), 5800);
        }
    </script>
</body>
</html>
